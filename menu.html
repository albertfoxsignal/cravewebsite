<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/icon.svg" />
<title>Menu — Crave Robotics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f4f0; --bg2:#eeede8; --bg3:#e6e5df; --white:#ffffff;
  --border:rgba(0,0,0,0.08); --borderB:rgba(0,0,0,0.15);
  --orange:#ea6d10; --orangeD:rgba(234,109,16,0.12);
  --lemon:#c79500; --lemonD:rgba(199,149,0,0.1);
  --text:#111111; --textS:#5a5c64; --textM:#9a9ca5;
  --font:'Montserrat',sans-serif; --serif:'Fraunces',serif;
}
html { scroll-behavior:smooth; }
body { font-family:var(--font); background:var(--bg); color:var(--text); overflow-x:hidden; min-height:100vh; }

/* NAV */
nav {
  position:sticky; top:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 3rem; height:68px;
  background:rgba(245,244,240,0.92); backdrop-filter:blur(20px);
  border-bottom:0.5px solid var(--border);
}
.nav-logo { display:flex; align-items:center; text-decoration:none; }
.nav-logo img { height:34px; width:auto; display:block; }
.nav-links { display:flex; gap:2rem; list-style:none; }
.nav-links a { font-size:0.75rem; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:var(--textS); text-decoration:none; transition:color 0.2s; }
.nav-links a:hover { color:var(--text); }
.nav-links a.active { color:var(--orange); }
.nav-cta { background:var(--orange); color:#fff; font-family:var(--font); font-size:0.73rem; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; border:none; padding:0.55rem 1.3rem; border-radius:6px; cursor:pointer; transition:opacity 0.2s; text-decoration:none; display:inline-block; }
.nav-cta:hover { opacity:0.88; }

/* PAGE HEADER */
.page-header { max-width:1280px; margin:0 auto; padding:4rem 3rem 3rem; border-bottom:0.5px solid var(--border); }
.header-eyebrow { font-size:0.68rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:var(--orange); margin-bottom:0.75rem; display:block; opacity:0; transform:translateY(14px); animation:hIn 0.65s cubic-bezier(0.22,1,0.36,1) 0.05s forwards; }
.header-h1 { font-family:var(--serif); font-size:clamp(3rem,6vw,5rem); font-weight:700; line-height:1.02; letter-spacing:-0.025em; opacity:0; transform:translateY(20px); animation:hIn 0.8s cubic-bezier(0.22,1,0.36,1) 0.18s forwards; }
.header-h1 em { font-style:italic; display:inline-block; padding-right:0.08em; background:linear-gradient(90deg,var(--orange),var(--lemon)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.header-meta { opacity:0; transform:translateY(12px); animation:hIn 0.7s cubic-bezier(0.22,1,0.36,1) 0.32s forwards; display:flex; align-items:flex-end; justify-content:space-between; margin-top:1.5rem; }
.header-sub { font-size:0.9rem; color:var(--textS); }
@keyframes hIn { to { opacity:1; transform:translateY(0); } }

/* LAYOUT */
.shop-layout { max-width:1280px; margin:0 auto; padding:3rem 3rem 6rem; display:grid; grid-template-columns:220px 1fr; gap:3rem; align-items:start; }

/* SIDEBAR */
.sidebar { position:sticky; top:88px; display:flex; flex-direction:column; gap:2rem; }
.filter-title { font-size:0.65rem; font-weight:800; letter-spacing:0.16em; text-transform:uppercase; color:var(--textM); margin-bottom:0.9rem; padding-bottom:0.7rem; border-bottom:0.5px solid var(--border); }
.cat-list { display:flex; flex-direction:column; gap:2px; }
.cat-btn { width:100%; text-align:left; padding:0.55rem 0.8rem; border-radius:7px; font-family:var(--font); font-size:0.8rem; font-weight:600; color:var(--textS); background:transparent; border:none; cursor:pointer; transition:background 0.18s,color 0.18s; display:flex; align-items:center; justify-content:space-between; gap:0.5rem; }
.cat-btn:hover { background:rgba(0,0,0,0.04); color:var(--text); }
.cat-btn.active { background:var(--orangeD); color:var(--orange); }
.cat-count { font-size:0.65rem; font-weight:700; color:var(--textM); background:var(--bg2); border-radius:100px; padding:1px 7px; }
.cat-btn.active .cat-count { background:rgba(234,109,16,0.15); color:var(--orange); }

/* GRID */
.grid-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; }
.grid-result-count { font-size:0.78rem; font-weight:600; color:var(--textM); }
.sort-select { font-family:var(--font); font-size:0.75rem; font-weight:600; color:var(--textS); background:var(--white); border:0.5px solid var(--border); border-radius:6px; padding:0.45rem 0.8rem; outline:none; cursor:pointer; }
.product-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1.2rem; }

/* PRODUCT CARD */
.pc {
  background:var(--white); border:0.5px solid var(--border); border-radius:14px;
  overflow:hidden; display:block; position:relative;
  transition:transform 0.32s cubic-bezier(0.22,1,0.36,1),box-shadow 0.32s,border-color 0.2s;
  opacity:0; transform:translateY(24px) scale(0.97);
}
.pc.shown { opacity:1; transform:none; transition:opacity 0.5s cubic-bezier(0.22,1,0.36,1),transform 0.5s cubic-bezier(0.22,1,0.36,1),box-shadow 0.32s,border-color 0.2s; }
.pc:hover { transform:translateY(-8px) scale(1.01); box-shadow:0 20px 48px rgba(0,0,0,0.09); border-color:rgba(234,109,16,0.3); }

/* PLACEHOLDER IMAGE */
.pc-img-wrap { aspect-ratio:1; position:relative; overflow:hidden; }
.pc-placeholder {
  width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.5rem;
  background:var(--bg2);
}
.pc-placeholder-icon { font-size:2.4rem; line-height:1; }
.pc-placeholder-label { font-size:0.6rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--textM); }
.pc-tag { position:absolute; top:0.7rem; left:0.7rem; font-size:0.58rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; padding:3px 8px; border-radius:4px; color:#fff; }
.tag-breakfast { background:rgba(199,149,0,0.85); }
.tag-entree    { background:rgba(234,109,16,0.85); }
.tag-snack     { background:rgba(59,130,246,0.85); }
.tag-dessert   { background:rgba(168,85,247,0.85); }

.pc-body { padding:1rem 1.1rem 1.2rem; }
.pc-name { font-size:0.83rem; font-weight:700; line-height:1.4; margin-bottom:0.5rem; color:var(--text); }
.pc-footer { display:flex; align-items:center; justify-content:space-between; }
.pc-price { font-family:var(--serif); font-size:1.3rem; font-weight:700; color:var(--orange); }
.pc-cat-label { font-size:0.62rem; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; color:var(--textM); }

/* EMPTY */
.empty { grid-column:1/-1; text-align:center; padding:5rem 2rem; }
.empty-title { font-family:var(--serif); font-size:2rem; font-weight:700; color:var(--textM); margin-bottom:0.5rem; }
.empty-sub { font-size:0.9rem; color:var(--textM); }

/* FOOTER */
footer { border-top:0.5px solid var(--border); padding:2.5rem 3rem; max-width:1280px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
.foot-links { display:flex; gap:2rem; list-style:none; }
.foot-links a { font-size:0.75rem; color:var(--textM); text-decoration:none; transition:color 0.2s; }
.foot-links a:hover { color:var(--text); }
.foot-copy { font-size:0.72rem; color:var(--textM); }

/* MOBILE */
@media(max-width:960px){
  nav { padding:0 1.5rem; } .nav-links { display:none; }
  .page-header { padding:3rem 1.5rem 2rem; }
  .shop-layout { grid-template-columns:1fr; padding:0 1.5rem 4rem; }
  .sidebar { position:static; }
  .cat-list { flex-direction:row; flex-wrap:wrap; }
  .cat-btn { width:auto; }
  .product-grid { grid-template-columns:repeat(2,1fr); }
  footer { flex-direction:column; gap:1.5rem; text-align:center; padding:2rem 1.5rem; }
  .foot-links { flex-wrap:wrap; justify-content:center; }
}
@media(max-width:480px){ .product-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="nav-logo"><img src="/icon.svg" alt="Crave Robotics" /></a>
  <ul class="nav-links">
    <li><a href="/#about">About</a></li>
    <li><a href="/menu" class="active">Menu</a></li>
    <li><a href="/#locations">Locations</a></li>
    <li><a href="/cravebot">CraveBot</a></li>
    <li><a href="/craveos">Crave<span style="color:var(--orange)">OS</span></a></li>
  </ul>
  <a href="/" class="nav-cta">← Back to Home</a>
</nav>

<!-- HEADER -->
<div class="page-header">
  <span class="header-eyebrow">CraveBot Menu</span>
  <h1 class="header-h1">Gourmet on the <em>Go</em></h1>
  <div class="header-meta">
    <p class="header-sub">Hot, fresh meals ready in under 3 minutes — available 24/7 at a CraveBot near you.</p>
    <span id="countBadge" style="font-family:var(--serif);font-size:2rem;font-weight:700;color:var(--text);"></span>
  </div>
</div>

<!-- SHOP -->
<div class="shop-layout">
  <aside class="sidebar">
    <div>
      <div class="filter-title">Category</div>
      <div class="cat-list" id="catList"></div>
    </div>
    <div>
      <div class="filter-title">Sort by</div>
      <select class="sort-select" id="sortSelect" onchange="render()" style="width:100%;margin-top:0;">
        <option value="default">Featured</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="az">Name A–Z</option>
      </select>
    </div>
  </aside>

  <div>
    <div class="grid-header">
      <span class="grid-result-count" id="resultLabel"></span>
    </div>
    <div class="product-grid" id="grid"></div>
  </div>
</div>

<!-- FOOTER -->
<div style="border-top:0.5px solid var(--border);">
  <footer>
    <a href="/" style="display:flex;align-items:center;text-decoration:none;">
      <img src="/icon.svg" alt="Crave Robotics" style="height:26px;width:auto;" />
    </a>
    <ul class="foot-links">
      <li><a href="/">Home</a></li>
      <li><a href="/cravebot">CraveBot</a></li>
      <li><a href="https://www.craverobotics.co/privacy-policy" target="_blank">Privacy Policy</a></li>
      <li><a href="https://www.craverobotics.co/delete-account" target="_blank">Data Deletion</a></li>
    </ul>
    <div class="foot-copy">© 2025 Crave Robotics™</div>
  </footer>
</div>

<script>
const PRODUCTS = [
  // ── BREAKFAST ──
  { name:"Meat Lover's Breakfast Bowl",                      cat:"Breakfast", price:9,  icon:"🍳" },
  { name:"Sausage, Egg & Cheese Croissant Sandwich",         cat:"Breakfast", price:6,  icon:"🥐" },
  { name:"Sausage, Egg & Cheese Maple Griddle Cake Sandwich",cat:"Breakfast", price:7,  icon:"🧇" },
  { name:"Turkey Sausage, Egg White & Cheese English Muffin",cat:"Breakfast", price:6,  icon:"🍳" },
  { name:"Cinnamon French Toast Sticks (4 Pieces)",          cat:"Breakfast", price:5,  icon:"🍞" },

  // ── ENTREES ──
  { name:"Beef Bulgogi Fried Rice (14 oz)",  cat:"Entree", price:14, icon:"🍚" },
  { name:"Blackened Chicken Alfredo",        cat:"Entree", price:14, icon:"🍝" },
  { name:"Chicken & Shrimp Chow Mein",       cat:"Entree", price:13, icon:"🍜" },
  { name:"Chicken Fried Rice",               cat:"Entree", price:13, icon:"🍚" },
  { name:"Chicken Shawarma Bowl",            cat:"Entree", price:14, icon:"🥙" },
  { name:"Curry Rice Bowl",                  cat:"Entree", price:13, icon:"🍛" },
  { name:"Four Cheese Mac & Cheese",         cat:"Entree", price:11, icon:"🧀" },
  { name:"Gyudon Beef Rice Box",             cat:"Entree", price:14, icon:"🥩" },
  { name:"Kimchi Fried Rice",                cat:"Entree", price:13, icon:"🍚" },
  { name:"Meat Lasagna",                     cat:"Entree", price:13, icon:"🍝" },
  { name:"Plant-Based Meatball Marinara",    cat:"Entree", price:15, icon:"🌱" },
  { name:"Shrimp Alfredo",                   cat:"Entree", price:14, icon:"🍝" },
  { name:"Spaghetti With Meat Sauce",        cat:"Entree", price:13, icon:"🍝" },
  { name:"Spinach Artichoke Cavatappi",      cat:"Entree", price:13, icon:"🥦" },
  { name:"Sweet Corn Elote Bowl",            cat:"Entree", price:15, icon:"🌽" },
  { name:"Teriyaki Chicken Rice Box",        cat:"Entree", price:13, icon:"🍗" },
  { name:"Wagyu Beef Bowl",                  cat:"Entree", price:15, icon:"🥩" },

  // ── SNACKS ──
  { name:"Angus Cheeseburger",                      cat:"Snack", price:9,  icon:"🍔" },
  { name:"Chicken & Cheese Quesadilla",             cat:"Snack", price:8,  icon:"🫓" },
  { name:"Chicken & Cheese Taquitos (4 Pieces)",    cat:"Snack", price:7,  icon:"🌯" },
  { name:"Chicken, Cheese & Rice Chimichanga",      cat:"Snack", price:8,  icon:"🌯" },
  { name:"Deep Dish Four Cheese Pizza (5-Inch)",    cat:"Snack", price:8,  icon:"🍕" },
  { name:"Deep Dish Pepperoni Pizza (5-Inch)",      cat:"Snack", price:8,  icon:"🍕" },
  { name:"Deep Dish Supreme Pizza (5-Inch)",        cat:"Snack", price:9,  icon:"🍕" },
  { name:"Pepperoni Pizza Hot Pocket",              cat:"Snack", price:5,  icon:"🍕" },
  { name:"Philly Cheesesteak Sandwich",             cat:"Snack", price:9,  icon:"🥪" },
  { name:"Pizza Rolls (8 Pieces)",                  cat:"Snack", price:6,  icon:"🍕" },
  { name:"Chicken Nuggets (8 Pieces)",              cat:"Snack", price:7,  icon:"🍗" },
  { name:"Dinosaur Shaped Chicken Nuggets (8 Pieces)",cat:"Snack", price:7, icon:"🦕" },
  { name:"Chicken Soup Dumplings (6 Pieces)",       cat:"Snack", price:8,  icon:"🥟" },

  // ── DESSERT ──
  { name:"Apple Pie",                                    cat:"Dessert", price:6,  icon:"🥧" },
  { name:"New York Style Cheesecake",                    cat:"Dessert", price:6,  icon:"🍰" },
  { name:"Peanut Butter & Strawberry Jam Uncrustables",  cat:"Dessert", price:4,  icon:"🥜" },
  { name:"Brown Sugar Boba Ice Cream Bar",               cat:"Dessert", price:5,  icon:"🧋" },
  { name:"Haagen-Dazs Vanilla Milk Chocolate Almond Bar",cat:"Dessert", price:6,  icon:"🍫" },
  { name:"M&M's Vanilla Cookie Ice Cream Sandwich",      cat:"Dessert", price:5,  icon:"🍪" },
  { name:"Melona Ice Bar (Melon)",                       cat:"Dessert", price:4,  icon:"🍈" },
  { name:"Snickers Ice Cream Bars (2 Pack)",             cat:"Dessert", price:5,  icon:"🍫" },
  { name:"Vanilla Milkshake",                            cat:"Dessert", price:6,  icon:"🥛" },
];

const TAG_CLASS = { Breakfast:"tag-breakfast", Entree:"tag-entree", Snack:"tag-snack", Dessert:"tag-dessert" };
const CATS = ["All", "Breakfast", "Entree", "Snack", "Dessert"];
let activeCat = "All";

/* build sidebar */
const catList = document.getElementById("catList");
CATS.forEach(cat => {
  const count = cat === "All" ? PRODUCTS.length : PRODUCTS.filter(p => p.cat === cat).length;
  const btn = document.createElement("button");
  btn.className = "cat-btn" + (cat === "All" ? " active" : "");
  btn.dataset.cat = cat;
  btn.innerHTML = `${cat} <span class="cat-count">${count}</span>`;
  btn.onclick = () => {
    activeCat = cat;
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  };
  catList.appendChild(btn);
});

function render() {
  const sort = document.getElementById("sortSelect").value;
  let items = PRODUCTS.filter(p => activeCat === "All" || p.cat === activeCat);
  if (sort === "price-asc")  items = [...items].sort((a,b) => a.price - b.price);
  if (sort === "price-desc") items = [...items].sort((a,b) => b.price - a.price);
  if (sort === "az")         items = [...items].sort((a,b) => a.name.localeCompare(b.name));

  const grid = document.getElementById("grid");
  const label = document.getElementById("resultLabel");
  const badge = document.getElementById("countBadge");

  badge.textContent = items.length;
  label.textContent = items.length === PRODUCTS.length
    ? `All ${items.length} items`
    : `${items.length} item${items.length !== 1 ? "s" : ""}`;

  if (!items.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-title">No items</div><p class="empty-sub">Try a different category</p></div>`;
    return;
  }

  grid.innerHTML = items.map(p => `
    <div class="pc">
      <div class="pc-img-wrap">
        <div class="pc-placeholder">
          <div class="pc-placeholder-icon">${p.icon}</div>
          <div class="pc-placeholder-label">Photo coming soon</div>
        </div>
        <span class="pc-tag ${TAG_CLASS[p.cat]}">${p.cat}</span>
      </div>
      <div class="pc-body">
        <div class="pc-name">${p.name}</div>
        <div class="pc-footer">
          <span class="pc-price">$${p.price.toFixed(2)}</span>
          <span class="pc-cat-label">${p.cat}</span>
        </div>
      </div>
    </div>`).join("");

  requestAnimationFrame(() => {
    grid.querySelectorAll(".pc").forEach((el, i) => {
      setTimeout(() => el.classList.add("shown"), i * 35);
    });
  });
}

render();
</script>
</body>
</html>
